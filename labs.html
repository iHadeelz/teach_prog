<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحتوى التعليمي | TechFlow Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0f172a;
            --trust-blue: #1e293b;
            --accent-gold: #fbbf24;
            --white: #ffffff;
            --header-height: 70px;
        }

        /* --- Base Styles --- */
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            margin: 0;
            padding: 0;
            color: var(--white);
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- Simple Header --- */
        header {
            height: var(--header-height);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(14px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-logo {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Tajawal';
            font-weight: bold;
            transition: 0.2s ease;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* --- Main Layout --- */
        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 35px;
        }

        /* --- Video Player Section --- */
        .video-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            height: fit-content;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #currentTitle {
            margin: 20px 0 0 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--white);
            line-height: 1.5;
        }

        /* --- Lessons List Section --- */
        .lessons-sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .category-card h3 {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 10px;
        }

        .cyber-title { color: #38bdf8; }
        .programming-title { color: #a78bfa; }

        .lesson-box {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.25s ease;
        }

        .lesson-box:last-child {
            margin-bottom: 0;
        }

        .lesson-box:hover {
            border-color: rgba(251,191,36,0.3);
            background: rgba(251,191,36,0.05);
            transform: translateX(-3px);
        }

        .lesson-box i {
            font-size: 1.1rem;
            color: var(--accent-gold);
        }

        .lesson-box span {
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        /* --- Responsive Design --- */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">TechFlow <span style="color: var(--accent-gold);">Academy</span></div>
        <button class="logout-btn" onclick="logoutAction()"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </header>

    <div class="container">
        <main class="video-section">
            <div class="video-container">
                <iframe 
                    id="mainPlayer" 
                    src="" 
                    allow="autoplay; fullscreen;" 
                    allowfullscreen>
                </iframe>
            </div>
            <h2 id="currentTitle">اختر درساً من القائمة لبدء المشاهدة 🚀</h2>
        </main>

        <aside class="lessons-sidebar">
            <div class="category-card">
                <h3 class="cyber-title"><i class="fas fa-shield-alt"></i> الأمن السيبراني</h3>
                <div id="cyberLessons"></div>
            </div>

            <div class="category-card">
                <h3 class="programming-title"><i class="fas fa-code"></i> لغات البرمجة</h3>
                <div id="programmingLessons"></div>
            </div>
        </aside>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyCjXncHwNn0tjweqvmJKmoF9BBkff4vU90",
            authDomain: "labs-3c92f.firebaseapp.com",
            projectId: "labs-3c92f",
            storageBucket: "labs-3c92f.firebasestorage.app",
            messagingSenderId: "1081268346222",
            appId: "1:1081268346222:web:fd8e4f28082bd72bfdb57f",
            measurementId: "G-ZH9N90EGD3"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // التأكد من تسجيل الدخول أولاً قبل جلب الدروس
        function checkAuthAndLoad() {
            const savedEmail = localStorage.getItem("userEmail");
            if (!savedEmail) { 
                window.location.href = "login.html"; 
            } else {
                loadLessonsOnly();
            }
        }

        // دالة جلب وعرض الدروس فقط ومراقبتها بشكل حي
        function loadLessonsOnly() {
            const sections = { 
                cyber: 'cyberLessons', 
                programming: 'programmingLessons' 
            };

            // وضع مؤشر التحميل المؤقت
            Object.values(sections).forEach(id => {
                document.getElementById(id).innerHTML = `<p style="font-size:0.8rem; text-align:center; opacity:0.5; padding:10px;">جاري تحميل الدروس...</p>`;
            });

            // جلب الدروس مرتبة من الأحدث للأقدم
            db.collection("lessons")
              .orderBy("createdAt", "desc")
              .onSnapshot(snap => {
                
                // تفريغ الحاويات فور وصول البيانات الحية
                Object.values(sections).forEach(id => {
                    document.getElementById(id).innerHTML = "";
                });

                if (snap.empty) {
                    Object.values(sections).forEach(id => {
                        document.getElementById(id).innerHTML = `<p style="font-size:0.8rem; text-align:center; opacity:0.4;">لا توجد دروس حالياً</p>`;
                    });
                    return;
                }

                snap.docs.forEach(docItem => {
                    const lesson = docItem.data();

                    // التحقق من تصنيف الدرس إذا كان يتبع للأمن السيبراني أو البرمجة
                    if (sections[lesson.category]) {
                        const div = document.createElement('div');
                        div.className = "lesson-box";
                        div.innerHTML = `
                            <i class="fas fa-play-circle"></i>
                            <span>${lesson.title}</span>
                        `;

                        // عند النقر يتم تشغيل الفيديو وتحديث العنوان مباشرة
                        div.onclick = () => playVideo(lesson.url, lesson.title);

                        const targetId = sections[lesson.category];
                        document.getElementById(targetId).appendChild(div);
                    }
                });
            }, error => {
                console.error("Firestore Error:", error);
            });
        }

        // دالة معالجة روابط الفيديو وتشغيلها (يوتيوب أو جوجل درايف)
        function playVideo(url, title) {
            let finalUrl = url;

            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let id = url.includes("v=") ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                finalUrl = `https://www.youtube.com/embed/${id}?autoplay=1`;
            } 
            else if (url.includes("drive.google.com")) {
                let fileId = url.includes("/file/d/") 
                    ? url.split('/file/d/')[1].split('/')[0] 
                    : url.split('id=')[1].split('&')[0];
                finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;
            }

            document.getElementById('mainPlayer').src = finalUrl;
            document.getElementById('currentTitle').innerText = title;
        }

        // تسجيل الخروج
        const logoutAction = () => auth.signOut().then(() => {
            localStorage.removeItem("userEmail");
            window.location.href = "login.html";
        });

        // تشغيل الفحص والجلب فوراً
        checkAuthAndLoad();
    </script>
</body>
</html>

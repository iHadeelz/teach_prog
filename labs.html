<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحتوى التعليمي | TechFlow Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      :root {
            --bg-darker: #060813;
            --bg-card: rgba(13, 20, 38, 0.6);
            --accent-gold: #fbbf24;
            --accent-gold-glow: rgba(251, 191, 36, 0.15);
            --cyber-blue: #0ea5e9;
            --cyber-blue-glow: rgba(14, 165, 233, 0.2);
            --prog-purple: #a855f7;
            --prog-purple-glow: rgba(168, 85, 247, 0.2);
            --logout-red: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --header-height: 80px;
            --border-glow: rgba(255, 255, 255, 0.05);
        }

        /* --- Base & Futuristic Grid Background --- */
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-darker);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* --- Premium Floating Header --- */
        header {
            height: var(--header-height);
            background: rgba(6, 8, 19, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-logo {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
        }

        /* --- Glassmorphic Cyber Buttons --- */
        .logout-btn {
            background: rgba(244, 63, 94, 0.06);
            color: #fda4af;
            border: 1px solid rgba(244, 63, 94, 0.25);
            padding: 10px 22px;
            border-radius: 14px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logout-btn:hover {
            background: var(--logout-red);
            color: var(--text-main);
            border-color: var(--logout-red);
            box-shadow: 0 0 25px rgba(244, 63, 94, 0.45);
            transform: translateY(-2px);
        }

        /* --- Main Container --- */
        .container {
            max-width: 1440px;
            margin: 40px auto;
            padding: 0 30px;
            display: grid;
            grid-template-columns: 2.3fr 1fr;
            gap: 35px;
        }

        /* --- Advanced Video Section --- */
        .video-section {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            height: fit-content;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #currentTitle {
            margin: 25px 0 0 0;
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.6;
            letter-spacing: -0.3px;
        }

        /* --- Sidebar & Neomorphic Cards --- */
        .lessons-sidebar {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .category-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 26px;
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .category-card h3 {
            margin: 0 0 22px 0;
            font-size: 1.25rem;
            font-weight: 800;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.2px;
        }

        /* Section Headings Glowing Effects */
        .cyber-title { 
            color: var(--cyber-blue); 
            text-shadow: 0 0 20px var(--cyber-blue-glow);
        }
        .programming-title { 
            color: var(--prog-purple); 
            text-shadow: 0 0 20px var(--prog-purple-glow);
        }

        /* --- Glowing & Interactive Lesson Boxes --- */
        .lesson-box {
            background: rgba(255, 255, 255, 0.015);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lesson-box:last-child {
            margin-bottom: 0;
        }

        /* Hover Mechanics */
        .lesson-box:hover {
            background: rgba(251, 191, 36, 0.04);
            border-color: rgba(251, 191, 36, 0.35);
            box-shadow: 0 10px 25px var(--accent-gold-glow);
            transform: translateX(-8px);
        }

        /* Smooth scale for the play icon */
        .lesson-box i {
            font-size: 1.25rem;
            color: var(--accent-gold);
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.4));
            transition: transform 0.3s ease;
        }

        .lesson-box:hover i {
            transform: scale(1.15);
        }

        .lesson-box span {
            font-size: 0.98rem;
            color: #cbd5e1;
            font-weight: 500;
            line-height: 1.5;
            transition: color 0.3s ease;
        }

        .lesson-box:hover span {
            color: var(--text-main);
        }

        /* --- Responsive Design Upgrades --- */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
                gap: 30px;
                margin: 20px auto;
            }
            header {
                padding: 0 30px;
            }
        }

        @media (max-width: 768px) {
            .video-section, .category-card {
                padding: 18px;
                border-radius: 20px;
            }
            .video-container {
                border-radius: 14px;
            }
            #currentTitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">TechFlow <span style="color: var(--accent-gold);">Academy</span></div>
        <button class="logout-btn" onclick="logoutAction()"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </header>

    <div class="container">
        <main class="video-section">
            <div class="video-container">
                <iframe 
                    id="mainPlayer" 
                    src="" 
                    allow="autoplay; fullscreen;" 
                    allowfullscreen>
                </iframe>
            </div>
            <h2 id="currentTitle">اختر درساً من القائمة لبدء المشاهدة 🚀</h2>
        </main>

        <aside class="lessons-sidebar">
            <div class="category-card">
                <h3 class="cyber-title"><i class="fas fa-shield-alt"></i> الأمن السيبراني</h3>
                <div id="cyberLessons"></div>
            </div>

            <div class="category-card">
                <h3 class="programming-title"><i class="fas fa-code"></i> لغات البرمجة</h3>
                <div id="programmingLessons"></div>
            </div>
        </aside>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyCjXncHwNn0tjweqvmJKmoF9BBkff4vU90",
            authDomain: "labs-3c92f.firebaseapp.com",
            projectId: "labs-3c92f",
            storageBucket: "labs-3c92f.firebasestorage.app",
            messagingSenderId: "1081268346222",
            appId: "1:1081268346222:web:fd8e4f28082bd72bfdb57f",
            measurementId: "G-ZH9N90EGD3"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // التأكد من تسجيل الدخول أولاً قبل جلب الدروس
        function checkAuthAndLoad() {
            const savedEmail = localStorage.getItem("userEmail");
            if (!savedEmail) { 
                window.location.href = "login.html"; 
            } else {
                loadLessonsOnly();
            }
        }

        // دالة جلب وعرض الدروس فقط ومراقبتها بشكل حي
        function loadLessonsOnly() {
            const sections = { 
                cyber: 'cyberLessons', 
                programming: 'programmingLessons' 
            };

            // وضع مؤشر التحميل المؤقت
            Object.values(sections).forEach(id => {
                document.getElementById(id).innerHTML = `<p style="font-size:0.8rem; text-align:center; opacity:0.5; padding:10px;">جاري تحميل الدروس...</p>`;
            });

            // جلب الدروس مرتبة من الأحدث للأقدم
            db.collection("lessons")
              .orderBy("createdAt", "desc")
              .onSnapshot(snap => {
                
                // تفريغ الحاويات فور وصول البيانات الحية
                Object.values(sections).forEach(id => {
                    document.getElementById(id).innerHTML = "";
                });

                if (snap.empty) {
                    Object.values(sections).forEach(id => {
                        document.getElementById(id).innerHTML = `<p style="font-size:0.8rem; text-align:center; opacity:0.4;">لا توجد دروس حالياً</p>`;
                    });
                    return;
                }

                snap.docs.forEach(docItem => {
                    const lesson = docItem.data();

                    // التحقق من تصنيف الدرس إذا كان يتبع للأمن السيبراني أو البرمجة
                    if (sections[lesson.category]) {
                        const div = document.createElement('div');
                        div.className = "lesson-box";
                        div.innerHTML = `
                            <i class="fas fa-play-circle"></i>
                            <span>${lesson.title}</span>
                        `;

                        // عند النقر يتم تشغيل الفيديو وتحديث العنوان مباشرة
                        div.onclick = () => playVideo(lesson.url, lesson.title);

                        const targetId = sections[lesson.category];
                        document.getElementById(targetId).appendChild(div);
                    }
                });
            }, error => {
                console.error("Firestore Error:", error);
            });
        }

        // دالة معالجة روابط الفيديو وتشغيلها (يوتيوب أو جوجل درايف)
        function playVideo(url, title) {
            let finalUrl = url;

            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let id = url.includes("v=") ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                finalUrl = `https://www.youtube.com/embed/${id}?autoplay=1`;
            } 
            else if (url.includes("drive.google.com")) {
                let fileId = url.includes("/file/d/") 
                    ? url.split('/file/d/')[1].split('/')[0] 
                    : url.split('id=')[1].split('&')[0];
                finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;
            }

            document.getElementById('mainPlayer').src = finalUrl;
            document.getElementById('currentTitle').innerText = title;
        }

        // تسجيل الخروج
        const logoutAction = () => auth.signOut().then(() => {
            localStorage.removeItem("userEmail");
            window.location.href = "login.html";
        });

        // تشغيل الفحص والجلب فوراً
        checkAuthAndLoad();
    </script>
</body>
</html>

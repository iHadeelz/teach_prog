<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحتوى التعليمي | TechFlow Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      :root {
            --ide-bg: #1e1e1e;          /* خلفية المحرر الافتراضية VS Code */
            --ide-sidebar: #252526;     /* خلفية القائمة الجانبية */
            --ide-header: #3c3c3c;      /* لون شريط التحكم العلوي */
            --accent-orange: #f47424;   /* لون لغة البرمجة والشغف */
            --syntax-keyword: #569cd6;  /* أزرق الأكواد البرمجية */
            --syntax-string: #ce9178;   /* لون النصوص داخل الكود */
            --syntax-comment: #6a9955;  /* أخضر التعليقات البرمجية */
            --syntax-type: #4ec9b0;     /* اللون الفيروزي للمتغيرات */
            --text-main: #d4d4d4;       /* لون النص البرمجي الافتراضي */
            --header-height: 65px;
            --font-code: 'Consolas', 'Fira Code', 'Courier New', monospace;
        }

        /* --- Base Setup & Code Background --- */
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #121212;
            background-image: 
                radial-gradient(rgba(86, 156, 214, 0.03) 1px, transparent 0),
                radial-gradient(rgba(244, 116, 36, 0.02) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- IDE Styled Header --- */
        header {
            height: var(--header-height);
            background: var(--ide-sidebar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 2px solid #2d2d2d;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-logo {
            font-family: var(--font-code);
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--syntax-keyword);
            direction: ltr; /* لتبدو كدالة برمجية صريحة */
        }

        .header-logo::before {
            content: "import { ";
            color: #c586c0; /* لون الـ Statement */
        }

        .header-logo::after {
            content: " } from 'TechFlow';";
            color: var(--text-main);
        }

        /* --- Developer Terminal Logout Button --- */
        .logout-btn {
            background: transparent;
            color: #f14c4c;
            border: 1px solid #f14c4c;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-code);
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease-in-out;
        }

        .logout-btn:hover {
            background: rgba(241, 76, 76, 0.1);
            box-shadow: 0 0 12px rgba(241, 76, 76, 0.2);
            transform: scale(0.98);
        }

        /* --- Container Layout --- */
        .container {
            max-width: 1500px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2.4fr 1fr;
            gap: 25px;
        }

        /* --- Compiler / Video Terminal Section --- */
        .video-section {
            background: var(--ide-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        /* محاكاة شريط التبويبات العلوي للمحرر */
        .video-section::before {
            content: "📄 main_compiler.java ●";
            position: absolute;
            top: -26px;
            right: 20px;
            background: var(--ide-bg);
            color: var(--syntax-type);
            font-family: var(--font-code);
            font-size: 0.8rem;
            padding: 4px 14px;
            border-radius: 6px 6px 0 0;
            border: 1px solid #333333;
            border-bottom: none;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d2d2d;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #currentTitle {
            margin: 20px 0 0 0;
            font-family: var(--font-code);
            font-size: 1.15rem;
            color: var(--syntax-string);
            background: rgba(206, 145, 120, 0.05);
            padding: 12px 16px;
            border-right: 4px solid var(--accent-orange);
            border-radius: 4px;
            line-height: 1.6;
        }

        #currentTitle::before {
            content: "System.out.println(\"";
            color: var(--syntax-keyword);
        }
        #currentTitle::after {
            content: "\");";
            color: var(--text-main);
        }

        /* --- Workspace Sidebar --- */
        .lessons-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .category-card {
            background: var(--ide-sidebar);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .category-card h3 {
            margin: 0 0 15px 0;
            font-family: var(--font-code);
            font-size: 1.05rem;
            font-weight: 600;
            border-bottom: 1px solid #333333;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cyber-title { color: var(--syntax-type); }
        .programming-title { color: #dcdcaa; } /* لون الدوال في VS Code */

        /* --- Git Commit Style Lesson Boxes --- */
        .lesson-box {
            background: rgba(30, 30, 30, 0.5);
            border-radius: 6px;
            padding: 12px 16px;
            border: 1px solid transparent;
            border-left: 3px solid #424242; /* افتراضي غير نشط */
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lesson-box:last-child {
            margin-bottom: 0;
        }

        /* تأثير التمرير يحاكي اختيار السطر البرمجي وعلامة الـ Git المحدثة */
        .lesson-box:hover {
            background: #2a2d2e;
            border-color: #383b3d;
            border-left-color: var(--syntax-keyword);
            transform: scale(1.01);
        }

        .lesson-box i {
            font-size: 1rem;
            color: var(--syntax-comment);
        }

        .lesson-box span {
            font-family: var(--font-code);
            font-size: 0.9rem;
            color: #cccccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lesson-box:hover span {
            color: #ffffff;
        }

        /* --- Responsive Tweaks --- */
        @media (max-width: 1100px) {
            .container {
                grid-template-columns: 1fr;
                margin: 40px auto;
            }
            .video-section::before {
                display: none; /* إخفاء علامة التبويب في الشاشات الصغيرة لتجنب التداخل */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">TechFlow <span style="color: var(--accent-gold);">Academy</span></div>
        <button class="logout-btn" onclick="logoutAction()"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </header>

    <div class="container">
        <main class="video-section">
            <div class="video-container">
                <iframe 
                    id="mainPlayer" 
                    src="" 
                    allow="autoplay; fullscreen;" 
                    allowfullscreen>
                </iframe>
            </div>
            <h2 id="currentTitle">اختر درساً من القائمة لبدء المشاهدة 🚀</h2>
        </main>

        <aside class="lessons-sidebar">
            <div class="category-card">
                <h3 class="cyber-title"><i class="fas fa-shield-alt"></i> الأمن السيبراني</h3>
                <div id="cyberLessons"></div>
            </div>

            <div class="category-card">
                <h3 class="programming-title"><i class="fas fa-code"></i> لغات البرمجة</h3>
                <div id="programmingLessons"></div>
            </div>
        </aside>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyCjXncHwNn0tjweqvmJKmoF9BBkff4vU90",
            authDomain: "labs-3c92f.firebaseapp.com",
            projectId: "labs-3c92f",
            storageBucket: "labs-3c92f.firebasestorage.app",
            messagingSenderId: "1081268346222",
            appId: "1:1081268346222:web:fd8e4f28082bd72bfdb57f",
            measurementId: "G-ZH9N90EGD3"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // التأكد من تسجيل الدخول أولاً قبل جلب الدروس
        function checkAuthAndLoad() {
            const savedEmail = localStorage.getItem("userEmail");
            if (!savedEmail) { 
                window.location.href = "login.html"; 
            } else {
                loadLessonsOnly();
            }
        }

        // دالة جلب وعرض الدروس فقط ومراقبتها بشكل حي
        function loadLessonsOnly() {
            const sections = { 
                cyber: 'cyberLessons', 
                programming: 'programmingLessons' 
            };

            // وضع مؤشر التحميل المؤقت
            Object.values(sections).forEach(id => {
                document.getElementById(id).innerHTML = `<p style="font-size:0.8rem; text-align:center; opacity:0.5; padding:10px;">جاري تحميل الدروس...</p>`;
            });

            // جلب الدروس مرتبة من الأحدث للأقدم
            db.collection("lessons")
              .orderBy("createdAt", "desc")
              .onSnapshot(snap => {
                
                // تفريغ الحاويات فور وصول البيانات الحية
                Object.values(sections).forEach(id => {
                    document.getElementById(id).innerHTML = "";
                });

                if (snap.empty) {
                    Object.values(sections).forEach(id => {
                        document.getElementById(id).innerHTML = `<p style="font-size:0.8rem; text-align:center; opacity:0.4;">لا توجد دروس حالياً</p>`;
                    });
                    return;
                }

                snap.docs.forEach(docItem => {
                    const lesson = docItem.data();

                    // التحقق من تصنيف الدرس إذا كان يتبع للأمن السيبراني أو البرمجة
                    if (sections[lesson.category]) {
                        const div = document.createElement('div');
                        div.className = "lesson-box";
                        div.innerHTML = `
                            <i class="fas fa-play-circle"></i>
                            <span>${lesson.title}</span>
                        `;

                        // عند النقر يتم تشغيل الفيديو وتحديث العنوان مباشرة
                        div.onclick = () => playVideo(lesson.url, lesson.title);

                        const targetId = sections[lesson.category];
                        document.getElementById(targetId).appendChild(div);
                    }
                });
            }, error => {
                console.error("Firestore Error:", error);
            });
        }

        // دالة معالجة روابط الفيديو وتشغيلها (يوتيوب أو جوجل درايف)
        function playVideo(url, title) {
            let finalUrl = url;

            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let id = url.includes("v=") ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                finalUrl = `https://www.youtube.com/embed/${id}?autoplay=1`;
            } 
            else if (url.includes("drive.google.com")) {
                let fileId = url.includes("/file/d/") 
                    ? url.split('/file/d/')[1].split('/')[0] 
                    : url.split('id=')[1].split('&')[0];
                finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;
            }

            document.getElementById('mainPlayer').src = finalUrl;
            document.getElementById('currentTitle').innerText = title;
        }

        // تسجيل الخروج
        const logoutAction = () => auth.signOut().then(() => {
            localStorage.removeItem("userEmail");
            window.location.href = "login.html";
        });

        // تشغيل الفحص والجلب فوراً
        checkAuthAndLoad();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | TechFlow Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
:root {
            --ide-bg: #1e1e1e;          /* خلفية المحرر الافتراضية VS Code */
            --ide-sidebar: #252526;     /* خلفية العناصر الجانبية والبطاقات */
            --accent-orange: #f47424;   /* لون لغة البرمجة والشغف */
            --syntax-keyword: #569cd6;  /* أزرق الأكواد البرمجية */
            --syntax-string: #ce9178;   /* لون النصوص داخل الكود */
            --syntax-type: #4ec9b0;     /* اللون الفيروزي للمتغيرات */
            --syntax-comment: #6a9955;  /* أخضر التعليقات */
            --text-main: #d4d4d4;       /* لون النص الافتراضي */
            --error-red: #f14c4c;       /* أحمر الأخطاء البرمجية */
            --font-code: 'Consolas', 'Fira Code', 'Courier New', monospace;
        }

        /* --- Base & Terminal Grid Background --- */
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #121212;
            background-image: 
                radial-gradient(rgba(86, 156, 214, 0.02) 1px, transparent 0),
                radial-gradient(rgba(244, 116, 36, 0.01) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* --- IDE Code Window Box --- */
        .login-card {
            background: var(--ide-bg);
            border: 1px solid #333333;
            border-radius: 14px;
            padding: 40px 35px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* شريط علوي يحاكي تبويب الملف البرمجي */
        .login-card::before {
            content: "🔑 auth_service.py";
            position: absolute;
            top: 0;
            left: 25px;
            background: var(--ide-sidebar);
            color: var(--syntax-string);
            font-family: var(--font-code);
            font-size: 0.8rem;
            padding: 6px 16px;
            border-radius: 0 0 6px 6px;
            border: 1px solid #333333;
            border-top: none;
        }

        /* دمج خطوط أرقام الأسطر الجانبية للمطورين */
        .login-card::after {
            content: "01\A 02\A 03\A 04\A 05\A 06\A 07\A 08\A 09\A 10\A 11\A 12";
            white-space: pre;
            position: absolute;
            right: 12px;
            top: 45px;
            color: #5a5a5a;
            font-family: var(--font-code);
            font-size: 0.85rem;
            line-height: 2.75;
            text-align: left;
            pointer-events: none;
        }

        /* --- Logo & Titles --- */
        .logo {
            font-family: var(--font-code);
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: var(--syntax-keyword);
            direction: ltr;
            text-align: center;
            padding-left: 15px; /* موازنة بسبب أرقام الأسطر اليمينية */
        }

        .logo::before { content: "class "; color: #9cdcfe; }
        .logo::after { content: ":"; color: var(--text-main); }

        .subtitle {
            color: var(--syntax-comment);
            font-family: var(--font-code);
            font-size: 0.88rem;
            margin-bottom: 35px;
            text-align: center;
            padding-left: 15px;
        }

        .subtitle::before { content: "# "; }

        /* --- Custom Code Forms --- */
        .form-group {
            margin-bottom: 22px;
            text-align: right;
            padding-right: 25px; /* إزاحة العناصر لتفادي أرقام الأسطر */
        }

        .form-group label {
            display: block;
            font-family: var(--font-code);
            font-size: 0.85rem;
            color: var(--syntax-type);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        /* الأيقونات البرمجية داخل المدخلات */
        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #5a5a5a;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            background: var(--ide-sidebar);
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 13px 45px 13px 15px;
            color: #ffffff;
            font-family: var(--font-code);
            font-size: 0.92rem;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* تأثير التركيز يشبه سطر الكود النشط */
        .form-group input:focus {
            outline: none;
            border-color: var(--syntax-keyword);
            background: #2d2d2d;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        .form-group input:focus + i {
            color: var(--syntax-keyword);
        }

        /* --- Execute / Login Button --- */
        .login-btn {
            width: calc(100% - 25px);
            margin-right: 25px;
            background: transparent;
            color: var(--accent-orange);
            border: 1px solid var(--accent-orange);
            padding: 14px;
            border-radius: 8px;
            font-family: var(--font-code);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.25s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(244, 116, 36, 0.05);
        }

        .login-btn:hover {
            background: rgba(244, 116, 36, 0.08);
            box-shadow: 0 0 20px rgba(244, 116, 36, 0.2);
            transform: scale(0.99);
        }

        .login-btn:disabled {
            border-color: #5a5a5a;
            color: #7a7a7a;
            cursor: not-allowed;
            background: transparent;
            box-shadow: none;
        }

        /* --- Terminal Error Alert --- */
        .error-message {
            background: rgba(241, 76, 76, 0.05);
            border: 1px solid rgba(241, 76, 76, 0.25);
            color: var(--error-red);
            padding: 12px 15px;
            border-radius: 8px;
            font-family: var(--font-code);
            font-size: 0.85rem;
            margin-bottom: 25px;
            margin-right: 25px;
            display: none;
            text-align: right;
            line-height: 1.5;
            box-shadow: 0 4px 15px rgba(241, 76, 76, 0.05);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">TechFlow <span style="color: var(--accent-gold);">Academy</span></div>
        <div class="subtitle">سجلي دخولكِ للوصول إلى دروسكِ مباشرة وبكل سهولة</div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText">تنبيه بالخطأ</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="example@techflow.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">
                <span>تأكيد وتسجيل الدخول</span>
                <i class="fas fa-arrow-left"></i>
            </button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjXncHwNn0tjweqvmJKmoF9BBkff4vU90",
            authDomain: "labs-3c92f.firebaseapp.com",
            projectId: "labs-3c92f",
            storageBucket: "labs-3c92f.firebasestorage.app",
            messagingSenderId: "1081268346222",
            appId: "1:1081268346222:web:fd8e4f28082bd72bfdb57f",
            measurementId: "G-ZH9N90EGD3"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        function handleLogin(e) {
            e.preventDefault();

            const emailInput = document.getElementById('email').value.trim().toLowerCase();
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const submitBtn = document.getElementById('submitBtn');

            // تهيئة واجهة الزر أثناء البحث والتحقق
            errorDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.querySelector('span').innerText = 'جاري الفحص في قاعدة البيانات...';

            // البحث يدوياً داخل كوليكشن الطالبات في Firestore عن الإيميل المدخل
            db.collection("students")
              .where("email", "==", emailInput)
              .get()
              .then((querySnapshot) => {
                  if (querySnapshot.empty) {
                      throw new Error("عذراً، هذا البريد الإلكتروني غير مسجل لدينا في قاعدة البيانات.");
                  }

                  let userFound = false;

                  // المطابقة بناءً على الحقل المحدث 'pass' القادم من الفايربيس الخاص بكِ
                  querySnapshot.forEach((doc) => {
                      const studentData = doc.data();
                      if (studentData.pass === passwordInput) {
                          userFound = true;
                      }
                  });

                  if (userFound) {
                      localStorage.setItem("userEmail", emailInput);
                      window.location.href = "labs.html";
                  } else {
                      throw new Error("كلمة المرور غير صحيحة، يرجى إعادة التأكد.");
                  }
              })
              .catch((error) => {
                  errorDiv.style.display = 'block';
                  errorText.innerText = error.message || "حدث خطأ غير متوقع أثناء الاتصال بقاعدة البيانات.";
                  
                  submitBtn.disabled = false;
                  submitBtn.querySelector('span').innerText = 'تأكيد وتسجيل الدخول';
              });
        }
    </script>
</body>
</html>
